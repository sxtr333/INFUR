services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    command: uvicorn infer_hub.api.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    environment:
      CPU_LIMIT_PCT: "70"
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python -m infer_hub.worker.runner
    env_file:
      - .env.example
    environment:
      CPU_LIMIT_PCT: "70"
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - api
    restart: unless-stopped
